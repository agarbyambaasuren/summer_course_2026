<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>
    <h1>HTML Table</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>e</td>
                <td>6</td>
            </tr>
            <tr>
                <td>ee</td>
                <td>7</td>
            </tr>
        </tbody>
    </table>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th colspan="2">Activity</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">Eee</td>
                <td>Cook</td>
                <td>30years</td>
            </tr>
            <tr>
                <td>AAA</td>
                <td> Battery</td>
                <td>39 days</td>
            </tr>
        </tbody>
    </table>
    <h1>Fruits and vegetables</h1>
    <table border="1">
        <thead>
            <tr>
                <th colspan="2">Veggies</th>
                <th colspan="2">Fruits</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">Yellow Pepper</td>
                <td rowspan="2">Banana</td>
                <td rowspan="2">Orange</td>
                <td rowspan="3"><b>Yellow</b></td>
            </tr>
            <tr>
                <td colspan="2">Yellow Zucchini</td>
            </tr>
            <tr>
                <td>Pumpkin</td>
                <td>Corn</td>
                <td colspan="2">Pineapples</td>
            </tr>
            <tr>
                <td colspan="2">
                    Red Pepper
                </td>
                <td rowspan="2">Strawberry</td>
                <td rowspan="2">Watermelon </td>
                <td rowspan="3"><b> Red</b></td>
            </tr>
            <tr>
                <td>Beet</td>
                <td>Tomato</td>
            </tr>
            <tr>
                <td colspan="2">
                    Radishes
                </td>
                <td colspan="2">Cherries</td>
            </tr>

        </tbody>
    </table>
</body>

</html>
