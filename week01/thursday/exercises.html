<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
</head>

<body>
    
    
    <h1>form1</h1>
    <form>
        <label for="name">Name </label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="email">email</label><br>
        <input type="email" id="email" name="email" required><br>
        <label for="number">Phone Number</label></br>
        <input type="tel" id="phone" name="number" required> </br>
        <label>Gender:</label><br>
        <input type="radio" id="m" name="gender" value="male">
        <label for="m">Male</label>
        <input type="radio" id="f" name="gender" value="female">
        <label for="f">Female</label><br>
        <label for="course"> </label>
        <select name="course" id="course">
            <option value="beginner">Beginner</option>
            <option value="medium">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>
        <label for="textarea">Comment</label>
        <textarea id="comment" name="comment" rows="1"></textarea></br>
        <button type="submit">Submit</button>
    </form>
    <hr>
    <h1>form2</h1>
    <form>
        <label for="email">email</label><br>
        <input type="email" id="email" name="email" required><br>
        <label for="password">password</label><br>
        <input type="password" id="password" name="password" required><br>
        <label for="checkbox">remember</label><br>
        <input type="checkbox" id="checkbox" name="checkbox"><br>
        <label for="button">Log in</label><br>
        <input type="submit" id="button" name="button" required><br>
    </form>
</body>

</html>
